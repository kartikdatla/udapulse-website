[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/uda-pulse/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/privacy-policy/"
  status = 301

[[redirects]]
  from = "/nhs-contract-guide.html"
  to = "/nhs-contract-guide/"
  status = 301
